<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>缘灵 iPhone Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b0b08;
        color: #f6e6c4;
        font-family: Inter, Arial, sans-serif;
      }

      .preview-wrap {
        display: grid;
        gap: 14px;
        justify-items: center;
        padding: 24px;
      }

      .preview-meta {
        width: min(393px, calc(100vw - 32px));
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(246, 230, 196, 0.76);
      }

      .phone {
        width: 393px;
        height: 852px;
        max-width: calc(100vw - 32px);
        max-height: calc(100vh - 76px);
        border: 10px solid #111;
        border-radius: 42px;
        background: #111;
        box-shadow:
          0 0 0 1px rgba(214, 164, 72, 0.55),
          0 26px 80px rgba(0, 0, 0, 0.65);
        overflow: hidden;
        position: relative;
      }

      .phone::before {
        content: "";
        position: absolute;
        z-index: 2;
        top: 10px;
        left: 50%;
        width: 118px;
        height: 28px;
        transform: translateX(-50%);
        border-radius: 0 0 18px 18px;
        background: #111;
        pointer-events: none;
      }

      iframe {
        width: 393px;
        height: 852px;
        border: 0;
        background: #0f100d;
      }

      @media (max-width: 430px), (max-height: 920px) {
        .phone {
          transform: scale(min(calc((100vw - 32px) / 393), calc((100vh - 76px) / 852)));
          transform-origin: center;
        }
      }
    </style>
  </head>
  <body>
    <main class="preview-wrap">
      <div class="preview-meta">
        <span>iPhone 14/15 viewport</span>
        <span>393 x 852</span>
      </div>
      <section class="phone" aria-label="iPhone preview">
        <iframe src="/?mobile-diy=1#bracelets" title="缘灵 mobile preview"></iframe>
      </section>
    </main>
  </body>
</html>
